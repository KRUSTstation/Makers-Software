{% extends "base.html" %}

{% block title %}Create{% endblock title %}
{% block header %}Create a post:{% endblock header %}

{% block body %}
<div class="form-container">
   <form method="post">
      <div class="post-user">
         <label for="user">Posting as:</label>
         <input name="user" type="text" id="user" value="{{ username }}" readonly>
      </div>
      <div class="form-group">
         <label for="message">Enter text:</label><br>
         <textarea name="message" id="message" rows="10" cols="50" placeholder="Your message here...">{{ request.form["message"] }}</textarea>
      </div>
      <div class="form-group">
         <input type="submit" value="Post">
      </div>
   </form>
</div>
{% endblock body %}
